<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Suppress benign WebSocket/HMR connection errors from showing up as global unhandled rejections or error overlays in the editor preview.
      window.addEventListener('unhandledrejection', function(event) {
        const errorText = event.reason ? (event.reason.message || String(event.reason)) : '';
        if (errorText.includes('WebSocket') || errorText.includes('websocket') || errorText.includes('WebSocket closed')) {
          event.preventDefault();
          event.stopPropagation();
          console.debug('Suppressed benign WebSocket HMR rejection:', errorText);
        }
      });
      window.addEventListener('error', function(event) {
        const errorText = event.message || '';
        if (errorText.includes('WebSocket') || errorText.includes('websocket') || errorText.includes('WebSocket closed')) {
          event.preventDefault();
          event.stopPropagation();
          console.debug('Suppressed benign WebSocket HMR error:', errorText);
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
